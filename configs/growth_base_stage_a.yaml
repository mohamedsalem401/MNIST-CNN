method: hybrid
seed: 11
seeds: [11]
deterministic: false
data:
  data_dir: data
  batch_size: 128
  eval_batch_size: 256
  num_workers: 0
  train_size: 55000
  val_size: 5000
  max_train_samples: 0
  max_val_samples: 0
  max_test_samples: 0
  train_subset_size: 8000
  val_subset_size: 2000
  test_subset_size: 5000
model:
  architecture: mlp
  hidden_sizes: [48, 48]
  cnn_channels: [16, 32]
  latent_dim: 128
  num_classes: 10
  dropout: 0.1
  extra_parametric_layer: false
  initial_width: 48
  initial_depth: 2
  growth_enabled: false
  growth_mode: width_and_depth
  growth_schedule: epoch_based
  growth_interval: 1
  growth_amount_width: 16
  growth_amount_depth: 1
  max_width: 96
  max_depth: 4
  growth_warmup_epochs: 1
  growth_stop_epoch: 3
  growth_performance_threshold: 0.93
  growth_min_delta: 0.001
  capacity_match_baseline: false
optim:
  optimizer: adam
  lr: 0.001
  weight_decay: 0.00001
  momentum: 0.9
  epochs: 3
  grad_clip_norm: 0.0
  scheduler: none
  early_stopping: false
  early_stopping_patience: 0
memory:
  enabled: true
  insertion_policy: always
  random_memory_control: false
  memory_enabled: true
  memory_layer: penultimate
  memory_k: 8
  memory_size: 20000
  memory_update_policy: always
  memory_forgetting_policy: helpfulness_age
  memory_distance: l2
  memory_query_source: full
  memory_value_target: delta
  memory_intervention_mode: gated
  memory_train_enabled: true
  memory_inference_enabled: true
  retrieval:
    k: 8
    metric: euclidean
    weighting: inverse_distance
    temperature: 0.1
    normalize_keys: true
    normalize_queries: true
    normalize_values: false
    class_conditional: false
    filter_same_label: false
  forgetting:
    policy: helpfulness_age
    memory_size: 20000
    ttl_steps: 0
    helpfulness_age_weight: 0.5
  target:
    value_type: delta
    target_construction: grad_delta
    gradient_step_size: 0.1
    centroid_momentum: 0.95
  intervention:
    enabled: true
    layer: penultimate
    mode: gated
    affected_dims: 48
    affected_selection: random
    query_mode: full
    query_projection_dims: 32
    gate_alpha: 0.4
    gate_temperature: 1.0
    gate_bias_init: 0.0
    gate_regularization: 0.0
    intervention_strength: 1.0
    intervention_clip: 0.0
    uncertainty_aware_gating: false
    gate_schedule: constant
    warmup_epochs: 1
    training_use: true
    inference_use: true
    populate_during_warmup: true
    refresh:
      enabled: true
      rate: 0.25
      match_distance_threshold: 0.35
      ema_key: 0.9
      ema_value: 0.9
evaluation:
  compute_calibration: true
  ece_bins: 15
  run_memory_toggle_eval: true
  confusion_matrix: true
  per_class_metrics: true
  max_samples_for_latent_vis: 2000
  strong_effect_threshold: 0.2
  n_seeds: 1
  primary_metric: val_accuracy
  multiple_comparison_correction: fdr_bh
  promotion_rule: validation_only_staged
  compute_budget_tier: stage_a_screen
logging:
  output_root: results/growth_analysis/stage_a_runs
  experiment_name: growth_base_stage_a
  log_every_steps: 100
  save_checkpoints: false
  save_memory_snapshots: true
